<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zovie Assistant – Zoiko Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p1:#7c3aed;--p2:#9333ea;--p3:#6d28d9;
  --bg:#f4f5f7;--card:#fff;--border:#e5e7eb;
  --txt:#111827;--sub:#6b7280;--font:'Inter',Segoe UI,sans-serif;
}
body{font-family:var(--font);background:var(--bg)}

/* ═══════════════════════════════════════════════════
   FAB TOGGLE BUTTON
═══════════════════════════════════════════════════ */
#chat-toggle{
  position:fixed;bottom:26px;right:26px;
  width:66px;height:66px;border-radius:50%;
  background:linear-gradient(135deg,var(--p1),var(--p2));
  color:#fff;border:none;font-size:28px;cursor:pointer;
  box-shadow:0 10px 32px rgba(124,58,237,.55);
  display:flex;align-items:center;justify-content:center;
  z-index:9990;transition:transform .2s,box-shadow .2s;
}
#chat-toggle:hover{transform:scale(1.1)}
#chat-toggle::before{
  content:'';position:absolute;inset:-9px;border-radius:50%;
  border:3px solid rgba(124,58,237,.28);
  animation:fabR 2.4s ease-out infinite;
}
@keyframes fabR{0%{transform:scale(1);opacity:.9}100%{transform:scale(1.75);opacity:0}}
#fab-dot{
  position:absolute;top:-3px;right:-3px;
  width:22px;height:22px;border-radius:50%;
  background:#ff3b30;color:#fff;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid #fff;
}

/* ═══════════════════════════════════════════════════
   CHAT WINDOW
═══════════════════════════════════════════════════ */
#chatbot{
  position:fixed;bottom:108px;right:26px;
  width:420px;
  border-radius:20px;display:none;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.3);
  z-index:9991;overflow:hidden;
  transform:scale(.88) translateY(28px);opacity:0;
  transition:transform .32s cubic-bezier(.34,1.56,.64,1),opacity .26s ease;
  max-height:calc(100vh - 128px);
}
#chatbot.open{display:flex}
#chatbot.visible{transform:scale(1) translateY(0);opacity:1}

/* ═══════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════ */
#header{
  background:linear-gradient(135deg,var(--p1),var(--p2));
  padding:13px 16px;
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.header-left{display:flex;gap:12px;align-items:center}
.header-av{
  width:46px;height:46px;border-radius:50%;
  background:#fff;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 0 2.5px rgba(255,255,255,.4);
  position:relative;flex-shrink:0;
}
.header-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.header-av-fb{
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;color:#fff;
  box-shadow:0 0 0 2.5px rgba(255,255,255,.4);
  flex-shrink:0;
}
.hav-dot{
  position:absolute;bottom:1px;right:1px;
  width:13px;height:13px;border-radius:50%;
  background:#4ade80;border:2.5px solid var(--p2);
  animation:dp 2s ease-in-out infinite;
}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.3}}
.header-info .hname{color:#fff;font-size:15.5px;font-weight:700}
.header-info .hsub{color:rgba(255,255,255,.75);font-size:11.5px;margin-top:1px}
.header-actions{display:flex;gap:4px}
.hbtn{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.85);
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:background .15s;
}
.hbtn:hover{background:rgba(255,255,255,.18)}
.hbtn svg{width:21px;height:21px;fill:currentColor}
/* Mute button active state */
#mute-btn.muted{background:rgba(255,59,48,.35);}
#mute-btn.muted svg{fill:#fff}
#mute-btn .mute-line{display:none}
#mute-btn.muted .mute-line{display:block}

/* ═══════════════════════════════════════════════════
   MESSAGES AREA
═══════════════════════════════════════════════════ */
#messages{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 14px 12px;
  background:#f9fafb;
  min-height:380px;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:rgba(124,58,237,.2);border-radius:4px}

.zdate{text-align:center;margin:4px 0 14px}
.zdate span{
  background:rgba(124,58,237,.1);color:var(--p1);
  font-size:11.5px;font-weight:600;padding:4px 18px;border-radius:8px;
}

/* ═══════════════════════════════════════════════════
   BOT ROW & BUBBLES
═══════════════════════════════════════════════════ */
.bot-row{
  display:flex;gap:9px;margin-bottom:4px;
  animation:mi .2s ease;
}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bot-row+.user-bubble,.user-bubble+.bot-row{margin-top:6px}

.ba{/* bot avatar */
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  overflow:hidden;background:#fff;
  display:flex;align-items:center;justify-content:center;
  align-self:flex-end;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.ba img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ba-fb{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--p1),var(--p2));
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:#fff;
  align-self:flex-end;
}

.bot-bubble{
  background:#fff;padding:11px 14px;
  border-radius:4px 14px 14px 14px;
  max-width:88%;font-size:14px;line-height:1.58;
  color:var(--txt);word-break:break-word;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  white-space:pre-line;
}

.user-bubble{
  background:linear-gradient(135deg,var(--p1),var(--p2));
  color:#fff;padding:11px 14px;
  border-radius:14px 4px 14px 14px;
  margin-left:auto;margin-bottom:4px;
  max-width:80%;font-size:14px;word-break:break-word;
  box-shadow:0 2px 10px rgba(124,58,237,.35);
  animation:mi .2s ease;
}

/* ═══════════════════════════════════════════════════
   QUICK REPLY CHIPS
═══════════════════════════════════════════════════ */
.quick{
  display:flex;flex-wrap:wrap;gap:7px;
  margin-top:10px;padding-top:9px;
  border-top:1px solid rgba(124,58,237,.1);
}
.qbtn{
  border:1.5px solid rgba(124,58,237,.35);
  background:#faf5ff;color:var(--p1);
  padding:7px 14px;border-radius:20px;
  cursor:pointer;font-size:12.5px;font-family:var(--font);
  font-weight:600;transition:all .15s ease;white-space:nowrap;
}
.qbtn:hover{background:var(--p1);color:#fff;border-color:var(--p1);transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,58,237,.3)}
.qbtn:active{transform:translateY(0)}
.qbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.qbtn.cta-btn{
  background:linear-gradient(135deg,var(--p1),var(--p2));
  color:#fff;border-color:transparent;
  box-shadow:0 3px 12px rgba(124,58,237,.4);
}
.qbtn.cta-btn:hover{opacity:.88;box-shadow:0 5px 16px rgba(124,58,237,.5)}

/* ═══════════════════════════════════════════════════
   3-OPTION CHOICE CARD
═══════════════════════════════════════════════════ */
.choice-card{
  background:#fff;border-radius:16px;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
  overflow:hidden;width:100%;margin:6px 0 6px 41px;
  max-width:calc(100% - 41px);
  animation:mi .2s ease;
}
.choice-btn{
  display:flex;align-items:center;gap:13px;
  width:100%;padding:14px 16px;
  border:none;border-bottom:1px solid #f3f4f6;
  background:#fff;cursor:pointer;font-family:var(--font);
  transition:background .15s ease;text-align:left;
}
.choice-btn:last-child{border-bottom:none}
.choice-btn:hover{background:#faf5ff}
.choice-btn.cta{
  background:linear-gradient(135deg,var(--p1),var(--p2));
  border-bottom:none;
}
.choice-btn.cta:hover{opacity:.88}
.choice-ico{
  width:42px;height:42px;border-radius:12px;
  background:rgba(124,58,237,.1);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;
}
.choice-btn.cta .choice-ico{background:rgba(255,255,255,.2)}
.choice-txt{flex:1;min-width:0}
.choice-lbl{font-size:14px;font-weight:700;color:var(--txt);display:block;margin-bottom:2px}
.choice-desc{font-size:11.5px;color:var(--sub);display:block;line-height:1.4}
.choice-btn.cta .choice-lbl,.choice-btn.cta .choice-desc{color:#fff}
.choice-btn.cta .choice-desc{color:rgba(255,255,255,.8)}
.choice-arrow{font-size:16px;color:#d1d5db;flex-shrink:0}
.choice-btn.cta .choice-arrow{color:rgba(255,255,255,.7)}
.choice-btn:hover .choice-arrow{color:var(--p1)}
.choice-btn.cta:hover .choice-arrow{color:#fff}

/* ═══════════════════════════════════════════════════
   PLAN CARDS — VERTICAL STACK
═══════════════════════════════════════════════════ */
.plan-stack{
  display:flex;flex-direction:column;gap:12px;
  margin:6px 0 6px 41px;
  max-width:calc(100% - 41px);
}
.plan-card{
  background:#fff;border-radius:16px;
  box-shadow:0 3px 16px rgba(0,0,0,.1);
  overflow:hidden;border:2px solid transparent;
  transition:border-color .2s,transform .15s,box-shadow .2s;
  width:100%;
}
.plan-card:hover{border-color:var(--p2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(124,58,237,.2)}
.plan-card.popular{border-color:var(--p1)}
.plan-badge{
  background:linear-gradient(90deg,var(--p1),var(--p2));
  color:#fff;font-size:12.5px;font-weight:700;
  padding:7px 16px;display:flex;align-items:center;gap:6px;
}
.plan-body{padding:16px 18px 14px}
.plan-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.plan-name{font-size:15.5px;font-weight:800;color:var(--txt)}
.plan-data{
  font-size:12px;font-weight:700;padding:4px 12px;border-radius:18px;
  background:#ede9fe;color:var(--p3);
}
.plan-data.unl{background:#e0f2fe;color:#0369a1}
.plan-price{font-size:30px;font-weight:900;color:var(--txt);margin-bottom:12px;line-height:1.05}
.plan-price span{font-size:14px;font-weight:500;color:var(--sub)}
.plan-hr{border:none;border-top:1.5px solid #f3f4f6;margin-bottom:12px}
.plan-feats{list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.plan-feats li{font-size:13.5px;color:#374151;display:flex;align-items:flex-start;gap:9px;line-height:1.45}
.plan-feats li .fi{font-size:13px;flex-shrink:0;margin-top:1px}
.plan-buy{
  display:block;width:100%;padding:13px;
  background:linear-gradient(135deg,var(--p1),var(--p2));
  color:#fff;border:none;border-radius:10px;
  font-size:14.5px;font-weight:700;cursor:pointer;
  font-family:var(--font);text-align:center;text-decoration:none;
  transition:opacity .2s,transform .15s;letter-spacing:.2px;
}
.plan-buy:hover{opacity:.88;transform:translateY(-1px)}

/* ═══════════════════════════════════════════════════
   REVIEW SECTION
═══════════════════════════════════════════════════ */
.kpi-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:9px;
  margin:6px 0 6px 41px;max-width:calc(100% - 41px);
}
.kpi-card{
  background:#fff;border-radius:12px;padding:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);text-align:center;
}
.kpi-num{font-size:24px;font-weight:900;color:var(--p1);display:block;line-height:1.1}
.kpi-lbl{font-size:11px;color:var(--sub);font-weight:600;margin-top:4px;line-height:1.3}

.review-stack{
  display:flex;flex-direction:column;gap:9px;
  margin:6px 0 6px 41px;max-width:calc(100% - 41px);
}
.review-card{
  background:#fff;border-radius:14px;padding:14px 16px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);width:100%;
}
.rv-stars{color:#f59e0b;font-size:17px;margin-bottom:7px;letter-spacing:1px}
.rv-text{font-size:13px;color:#374151;line-height:1.55;margin-bottom:8px;font-style:italic}
.rv-author{font-size:12.5px;font-weight:700;color:var(--p1)}
.rv-date{font-size:11px;color:var(--sub);margin-top:1px}

/* ═══════════════════════════════════════════════════
   TYPING DOTS
═══════════════════════════════════════════════════ */
#typing{display:none;align-items:flex-end;gap:9px;margin-bottom:4px}
.typing-bub{
  background:#fff;border-radius:4px 14px 14px 14px;
  padding:12px 16px;box-shadow:0 2px 10px rgba(0,0,0,.08);
  display:flex;gap:5px;align-items:center;
}
.typing-bub .d{width:8px;height:8px;background:#c4b5fd;border-radius:50%;animation:td 1.35s infinite}
.typing-bub .d:nth-child(2){animation-delay:.18s}
.typing-bub .d:nth-child(3){animation-delay:.36s}
@keyframes td{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* ═══════════════════════════════════════════════════
   MIC STATUS
═══════════════════════════════════════════════════ */
#mic-status{
  font-size:11.5px;color:var(--p1);text-align:center;
  padding:3px 12px;min-height:20px;background:#f9fafb;
  font-weight:600;font-style:italic;
  border-top:1px solid var(--border);
}

/* ═══════════════════════════════════════════════════
   INPUT AREA
═══════════════════════════════════════════════════ */
#input-area{
  display:flex;gap:8px;padding:10px 12px 12px;
  border-top:1px solid var(--border);background:#fff;flex-shrink:0;
  align-items:flex-end;
}
.input-wrap{
  flex:1;background:#f3f4f6;border-radius:24px;
  display:flex;align-items:center;
  border:1.5px solid transparent;transition:border-color .2s;
  overflow:hidden;
}
.input-wrap:focus-within{border-color:rgba(124,58,237,.45);background:#faf5ff}
#user-input{
  flex:1;padding:10px 14px;border:none;background:transparent;
  font-size:14.5px;outline:none;font-family:var(--font);color:var(--txt);
  resize:none;max-height:100px;line-height:1.5;
}
#user-input::placeholder{color:#9ca3af}
#user-input:disabled{opacity:.55}
.ib{/* icon button */
  width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .18s ease;font-size:18px;
}
.ib:hover{transform:scale(1.09)}
.ib:active{transform:scale(.93)}
#mic{background:#f3f4f6;color:var(--sub)}
#mic svg{width:22px;height:22px;fill:currentColor}
#mic.listening{background:var(--p1)}
#mic.listening svg{fill:#fff}
#send{background:linear-gradient(135deg,var(--p1),var(--p2));box-shadow:0 4px 14px rgba(124,58,237,.4)}
#send svg{width:21px;height:21px;fill:#fff}
.zpow{
  text-align:center;font-size:10.5px;color:#9ca3af;
  padding:3px 0 7px;background:#fff;font-style:italic;
}

/* ═══════════════════════════════════════════════════
   MUTE TOAST
═══════════════════════════════════════════════════ */
#mute-toast{
  position:absolute;top:70px;right:14px;
  background:rgba(0,0,0,.72);color:#fff;
  font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;
  opacity:0;transition:opacity .25s;pointer-events:none;z-index:10;
}
#mute-toast.show{opacity:1}

/* ═══════════════════════════════════════════════════
   RATING WIDGET
═══════════════════════════════════════════════════ */
.rating-wrap{
  background:#fff;border-radius:16px;padding:18px 20px;
  box-shadow:0 3px 16px rgba(0,0,0,.1);
  margin:6px 0 6px 41px;max-width:calc(100% - 41px);
  animation:mi .2s ease;
}
.rating-wrap .rt{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:3px}
.rating-wrap .rs{font-size:12px;color:var(--sub);margin-bottom:12px}
.star-row{display:flex;gap:7px}
.star{font-size:32px;cursor:pointer;color:#e5e7eb;transition:all .14s;background:none;border:none;padding:2px}
.star.active{color:#f59e0b;transform:scale(1.12)}
.feedback-form{
  margin-top:14px;display:none;
  border-top:1px solid var(--border);padding-top:14px;
}
.fi-lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px}
.fi-inp{
  width:100%;padding:10px 13px;margin-bottom:8px;
  border:1.5px solid var(--border);border-radius:10px;
  font-family:var(--font);font-size:13.5px;outline:none;
  transition:border .2s;color:var(--txt);resize:vertical;
}
.fi-inp:focus{border-color:var(--p1)}
.fi-submit{
  width:100%;padding:11px;
  background:linear-gradient(135deg,var(--p1),var(--p2));
  color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:opacity .2s;
}
.fi-submit:hover{opacity:.88}
.fi-submit:disabled{opacity:.55;cursor:not-allowed}

/* ═══════════════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════════════ */
@media(max-width:480px){
  #chatbot{width:calc(100vw - 12px);right:6px;bottom:88px;max-height:calc(100svh - 108px);border-radius:16px}
  .plan-stack,.review-stack,.kpi-grid,.choice-card,.rating-wrap{margin-left:41px;max-width:calc(100% - 41px)}
}
</style>
</head>
<body>

<!-- ══ FAB ══ -->
<button id="chat-toggle" aria-label="Chat with Zovie">
  <div id="fab-dot">1</div>
  💬
</button>

<!-- ══ CHAT WINDOW ══ -->
<div id="chatbot">

  <!-- Header -->
  <div id="header">
    <div class="header-left">
      <div id="hav-wrap"></div>
      <div class="header-info">
        <div class="hname">Zovie &middot; Zoiko Mobile</div>
        <div class="hsub" id="hsub">Online &middot; AI assistant</div>
      </div>
    </div>
    <div class="header-actions">
      <!-- MUTE BUTTON (NEW) -->
      <button class="hbtn" id="mute-btn" title="Mute / Unmute voice">
        <!-- Speaker icon (unmuted) -->
        <svg id="icon-unmuted" viewBox="0 0 24 24">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          <line class="mute-line" x1="3" y1="3" x2="21" y2="21" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="hbtn" title="Call us" onclick="window.open('tel:+441234567890')">
        <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      </button>
      <button class="hbtn" id="close-btn" title="Close">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  </div>

  <!-- Mute toast notification -->
  <div id="mute-toast">🔇 Voice muted</div>

  <!-- Messages -->
  <div id="messages">
    <div id="typing">
      <div id="t-av"></div>
      <div class="typing-bub">
        <div class="d"></div><div class="d"></div><div class="d"></div>
      </div>
    </div>
  </div>

  <div id="mic-status"></div>

  <!-- Input -->

function loadVoice() {
  const voices = speechSynthesis.getVoices()
  const prefs = [
    v=>v.name==='Serena',
    v=>v.name==='Kate',
    v=>v.name.includes('Google UK English Female'),
    v=>v.lang==='en-GB'&&/female/i.test(v.name),
    v=>v.lang==='en-GB',
    v=>v.lang.startsWith('en')
  ]
  for (const fn of prefs) { const f = voices.find(fn); if(f){ukV=f;break} }
}
if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoice
loadVoice()

function speak(text) {
  if (isMuted) return          // ← MUTE CHECK
  speechSynthesis.cancel()
  const clean = text.replace(/<[^>]+>/g,' ').replace(/https?:\/\/\S+/g,' ').replace(/[^\w\s',.!?£\-]/g,' ').replace(/\s{2,}/g,' ').trim()
  if (!clean) return
  const u = new SpeechSynthesisUtterance(clean)
  if (ukV) u.voice = ukV; u.lang = 'en-GB'; u.rate = 0.9; u.pitch = 1.06
  speechSynthesis.speak(u)
}

  const stack = document.createElement('div'); stack.className = 'review-stack'
  REVIEWS.forEach(r => {
    const c = document.createElement('div'); c.className = 'review-card'
    c.innerHTML = `<div class="rv-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div><div class="rv-text">"${r.text}"</div><div class="rv-author">${r.author}</div><div class="rv-date">${r.date}</div>`
    stack.appendChild(c)
  })
  msgs.insertBefore(stack, typEl)

  bot('Ready to join thousands of happy Zoiko customers? 😊', ['📋 Zoiko Plans','🏠 Main Menu'])
  scroll()
  speak('Here are our customer reviews. We have over 2400 happy customers with a 4.8 star average rating.')
}

    case 'Data Only Plans':    showPlanChoice('data'); return true

    case '⬅️ Back':           showPlanTypes(); return true
    case '📋 Zoiko Plans':    showPlanTypes(); return true
    case '🏠 Main Menu':      history=[]; mainMenu(); return true
    case '⬅️ Back to Plan Types': showPlanTypes(); return true
    case '💼 Business Deals': showBusinessChoice(); return true
    case '⭐ Customer Reviews':
    case 'Customer Reviews':   showReviews(); return true
    case 'Rate & Exit':        showRating(true); return true

    case 'Devices':
      bot('Zoiko offers modern smartphones and compatible devices designed to work seamlessly with our mobile network.',
        [{text:'View Devices',url:'https://zoikomobile.co.uk/devices/'},'🏠 Main Menu']); return true

        [{text:'Explore Animals & Music',url:'https://zoikomobile.co.uk/animals-and-music/'},'🏠 Main Menu']); return true

    case 'About Us':

        [{text:'Read About Zoiko',url:'https://zoikomobile.co.uk/about-us/'},'🏠 Main Menu']); return true

    case 'Activate SIM':
      bot('Activating your Zoiko SIM is quick and simple. Follow the steps online to start your plan immediately.',
        [{text:'Activate SIM',url:'https://zoikomobile.co.uk/activate-your-sim/'},'🏠 Main Menu']); return true

    case 'Top Up':
      bot('Recharge your Zoiko SIM easily via the online top-up portal — pick your plan and pay to continue uninterrupted.',
        [{text:'Top Up Now',url:'https://zoikomobile.co.uk/recharge/'},'🏠 Main Menu']); return true

    case 'Switch & Save':
      bot('Switch to Zoiko and enjoy affordable plans, reliable coverage, and seamless connectivity while saving money monthly.',
        [{text:'Switch to Zoiko',url:'https://zoikomobile.co.uk/switch-and-save/'},'🏠 Main Menu']); return true

    case 'Contact Us':
      bot('Need help? Reach our support team through the contact page anytime.',

        [{text:'Visit Support',url:'https://zoikomobile.co.uk/support/'},'🏠 Main Menu']); return true

        [{text:'International Calling Details',url:'https://zoikomobile.co.uk/international-calling/'},'🏠 Main Menu']); return true

/* ══════════════════════════════════════════════════════
   GPT CALL → /chat/
   FIX: always called for ANY free-text not in KNOWN_CHIPS
══════════════════════════════════════════════════════ */
async function askGPT(text) {
  if (isBusy) return
  setBusy(true); showTyping()
  try {
    const res = await fetch('/chat/', {
      method:'POST',
      headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},
      body:JSON.stringify({message:text, history}),
    })
    if (!res.ok) throw new Error('HTTP ' + res.status)
    const d = await res.json()
    if (d.error) {
      bot('Sorry, something went wrong. Please try again.', ['🏠 Main Menu','Contact Us'])
    } else {
      history = d.history || history
      const chips = Array.isArray(d.items) ? [...d.items] : []
      if (!chips.some(c => (typeof c === 'string' ? c : c.text || '').includes('Main Menu'))) chips.push('🏠 Main Menu')
      bot(d.reply, chips)
    }
  } catch(e) {
    console.error('[Zovie]', e)
    bot("I couldn't reach the server. Please check your connection.", ['🏠 Main Menu'])
  }
  setBusy(false)
}

/* ══════════════════════════════════════════════════════
   SEND — unified handler
   FIX: handleChip returns true/false — only calls GPT
        when the text is NOT a known menu option
══════════════════════════════════════════════════════ */
function sendMessage(override) {
  if (isBusy) return
  const text = (override !== undefined ? override : inp.value).trim()
  if (!text) return
  inp.value = ''; inp.style.height = 'auto'

  if (RESET_WORDS.has(text.toLowerCase().trim())) {
    history = []; userBubble(text); mainMenu(); return
  }

  userBubble(text)

  // handleChip returns true if it matched a menu item
  // returns false for free-text → send to GPT
  const handled = handleChip(text)
  if (!handled) askGPT(text)
}

sendBtn.onclick = () => sendMessage()
inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
})

/* ══════════════════════════════════════════════════════
   RATING WIDGET
══════════════════════════════════════════════════════ */
function showRating(closeAfter = false) {
  if (document.querySelector('.rating-wrap')) return
  bot('Thanks for chatting with Zovie today! 😊 How was your experience?')
  setTimeout(() => {
    const wrap = document.createElement('div'); wrap.className = 'rating-wrap'
    wrap.innerHTML = `
      <div class="rt">Rate your experience</div>
      <div class="rs">Tap a star to rate Zovie</div>
      <div class="star-row">
        <button class="star" data-i="1">★</button>
        <button class="star" data-i="2">★</button>
        <button class="star" data-i="3">★</button>
        <button class="star" data-i="4">★</button>
        <button class="star" data-i="5">★</button>
      </div>
      <div class="feedback-form" id="zrf">
        <div class="fi-lbl">Tell us more</div>
        <input  class="fi-inp" id="zrn" placeholder="Full name">
        <input  class="fi-inp" id="zrp" placeholder="Phone number">
        <input  class="fi-inp" id="zre" placeholder="Email address">
        <textarea class="fi-inp" id="zrm" rows="3" placeholder="Tell us how we can improve…"></textarea>
        <button class="fi-submit" id="zrb">Send Feedback</button>
      </div>`
    msgs.insertBefore(wrap, typEl); scroll()

    document.getElementById('zrb').onclick = () => submitRating(closeAfter)
    wrap.querySelectorAll('.star').forEach(btn => {
      btn.onclick = () => {
        selectedRating = parseInt(btn.dataset.i)
        wrap.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('active', i < selectedRating))
        if (selectedRating >= 4) {
          bot('Brilliant — thank you so much! ⭐ Have a wonderful day! 👋')
          if (closeAfter) setTimeout(() => closeChat(), 2800)
        } else {
          document.getElementById('zrf').style.display = 'block'; scroll()
        }
      }
    })
  }, 900)
}

async function submitRating(closeAfter = false) {
  const btn = document.getElementById('zrb'); if(!btn) return
  btn.disabled = true; btn.textContent = 'Sending…'
  try {
    await fetch('/feedback/', {
      method:'POST',
      headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},
      body:JSON.stringify({
        rating: selectedRating,
        name:   (document.getElementById('zrn')||{}).value || '',
        phone:  (document.getElementById('zrp')||{}).value || '',
        email:  (document.getElementById('zre')||{}).value || '',
        message:(document.getElementById('zrm')||{}).value || '',
      }),
    })
  } catch(e) { console.error(e) }
  bot('Thank you! 🙏 A member of our team will be in touch shortly.')
  if (closeAfter) setTimeout(() => closeChat(), 2800)
}

/* ══════════════════════════════════════════════════════
   SPEECH RECOGNITION
══════════════════════════════════════════════════════ */
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition
  recog = new SR()
  recog.lang = 'en-GB'; recog.continuous = false; recog.interimResults = false; recog.maxAlternatives = 1
  recog.onstart  = () => { isListening=true;  micBtn.classList.add('listening');    hSub.textContent='Listening…'; micSt.textContent='🎙️ Listening… speak now' }
  recog.onend    = () => { isListening=false; micBtn.classList.remove('listening'); hSub.textContent='Online · AI assistant'; setTimeout(()=>micSt.textContent='',3000) }
  recog.onerror  = e  => { isListening=false; micBtn.classList.remove('listening'); hSub.textContent='Online · AI assistant'; micSt.textContent=e.error==='no-speech'?'No speech detected.':'Mic error: '+e.error; setTimeout(()=>micSt.textContent='',3500) }
  recog.onresult = e  => { const t=e.results[0][0].transcript.trim(); micSt.textContent=`✅ Heard: "${t}"`; sendMessage(t) }
}
micBtn.onclick = () => {
  if (!recog) { micSt.textContent='Speech not supported in this browser.'; setTimeout(()=>micSt.textContent='',3000); return }
  if (isListening) recog.stop()
  else try { recog.start() } catch(e) { micSt.textContent='Mic busy — try again.' }
}

/* ══════════════════════════════════════════════════════
   OPEN / CLOSE
══════════════════════════════════════════════════════ */
function openChat() {
  dot.style.display = 'none'
  const cb = document.getElementById('chatbot')
  cb.style.display = 'flex'; isOpen = true
  requestAnimationFrame(() => cb.classList.add('open','visible'))
  if (!started) { started = true; mainMenu() }
  setTimeout(() => inp.focus(), 380)
}
function closeChat() {
  const cb = document.getElementById('chatbot')
  cb.classList.remove('visible'); isOpen = false
  setTimeout(() => { cb.classList.remove('open'); cb.style.display = 'none' }, 330)
  speechSynthesis.cancel()
  if (recog && isListening) recog.stop()
}

fab.onclick = () => isOpen ? closeChat() : openChat()
closeB.onclick = () => closeChat()
document.addEventListener('click', e => {
  if (isOpen && !document.getElementById('chatbot').contains(e.target) && !fab.contains(e.target)) closeChat()
})
document.getElementById('chatbot').addEventListener('click', e => e.stopPropagation())
fab.addEventListener('click', e => e.stopPropagation())
</script>
